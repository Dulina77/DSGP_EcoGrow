<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaf Disease Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
        }

        .container {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 24px;
            color: #333;
        }

        form {
            margin-top: 20px;
        }

        input[type="file"] {
            margin: 15px 0;
            padding: 5px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            color: #444;
        }

        #imagePreview {
            margin-top: 20px;
            max-width: 100%;
            height: auto;
            display: none;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Leaf Disease Prediction</h1>
        <form id="uploadForm">
            <input type="file" id="imageInput" accept="image/*" required>
            <img id="imagePreview" alt="Image Preview">
            <button type="submit">Predict</button>
        </form>
        <div id="result" class="result"></div>
    </div>

    <script>
        // Image preview
        document.getElementById('imageInput').addEventListener('change', function(event) {
            const imagePreview = document.getElementById('imagePreview');
            const file = event.target.files[0];
            
            if (file) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                };
                
                reader.readAsDataURL(file);
            }
        });

        // Form submission for prediction
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const imageInput = document.getElementById('imageInput');
            const resultDiv = document.getElementById('result');

            if (!imageInput.files[0]) {
                resultDiv.textContent = "Please upload an image.";
                return;
            }

            const formData = new FormData();
            formData.append('image', imageInput.files[0]);

            try {
                resultDiv.textContent = "Processing...";

                const response = await fetch('http://127.0.0.1:5000/predict', {
                    method: 'POST',
                    body: formData,
                });

                const data = await response.json();

                if (!response.ok || data.error) {
                    resultDiv.innerHTML = `<span class="error">${data.error || 'Server error occurred.'}</span>`;
                    return;
                }

                resultDiv.innerHTML = `
                    <strong>Prediction:</strong> ${data.predicted_label}
                `;

                // Optional: add description for diseases
                if (data.predicted_label === "Rust") {
                    resultDiv.innerHTML += `
                        <p><strong>Rust Disease:</strong> Rust fungi are plant parasites that cause orange, red, yellow, or brown pustules on leaves. It reduces photosynthesis and weakens plants.</p>
                    `;
                } else if (data.predicted_label === "Powdery") {
                    resultDiv.innerHTML += `
                        <p><strong>Powdery Mildew:</strong> A fungal disease that appears as white powdery spots on leaves and stems. It can stunt growth and reduce yields.</p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">Error: ${error.message}</span>`;
            }
        });
    </script>
</body>
</html>
