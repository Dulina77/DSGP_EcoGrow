version: "3.1"

nlu:
- intent: greet
  examples: |
    - hey
    - hello
    - hi
    - hello there
    - good morning
    - good evening
    - hey there
    - let's go
    - hey dude
    - goodmorning
    - goodevening
    - good afternoon

- intent: goodbye
  examples: |
    - cu
    - good by
    - see you later
    - good night
    - bye
    - goodbye
    - have a nice day
    - see you around
    - bye bye

- intent: affirm
  examples: |
    - yes
    - y
    - indeed
    - of course
    - that sounds good
    - correct

- intent: deny
  examples: |
    - no
    - n
    - never
    - I don't think so
    - don't like that
    - no way
    - not really

- intent: mood_great
  examples: |
    - perfect
    - great
    - amazing
    - feeling like a king
    - wonderful
    - I am feeling very good
    - I am great
    - I am amazing
    - I am going to save the world
    - super stoked
    - extremely good
    - so so perfect

- intent: mood_unhappy
  examples: |
    - my day was horrible
    - I am sad
    - I don't feel very well
    - I am disappointed
    - super sad
    - I'm so sad
    - sad
    - very sad
    - unhappy
    - not good
    - not very good

- intent: bot_challenge
  examples: |
    - are you a bot?
    - are you a human?
    - am I talking to a bot?
    - am I talking to a human?

- intent: ask_plant_disease  # ✅ Intent for plant disease queries
  examples: |
    - Tell me about [Powdery Mildew](disease_name)
    - What are the symptoms of [Rust](disease_name)?
    - How do I treat [Leaf Spot](disease_name)?
    - What is [Blight](disease_name)?
    - Can you help me with [Anthracnose](disease_name)?
    - I need information about [Black Spot](disease_name).
    - What should I do for [Canker](disease_name)?
    - What causes [Downy Mildew](disease_name)?
    - What does [Cercospora Leaf Spot](disease_name) look like?
    - How can I prevent [Botrytis (Gray Mold)](disease_name)?
    - Do you have details on [Black Spot](disease_name)?
