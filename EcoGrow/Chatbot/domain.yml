version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - ask_plant_disease  # ✅ Intent for plant disease queries
  - ask_planting_techniques  # ✅ Intent for planting techniques

entities:
  - disease_name  # ✅ Now defined properly
  - plant_name  # ✅ Added entity for plant queries

slots:
  disease_name:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: disease_name

  plant_name:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: plant_name

responses:
  utter_greet:
    - text: "Hey! How are you?"

  utter_goodbye:
    - text: "Bye"

  utter_iamabot:
    - text: "I am a bot, powered by Rasa."

  utter_happy:
    - text: "Great, carry on!"

  utter_cheer_up:
    - text: "Here is something to cheer you up!"
      image: "https://i.imgur.com/nGF1K8f.jpg"

  utter_did_that_help:
    - text: "Did that help you?"

actions:
  - action_get_plant_info
  - action_get_planting_techniques  # ✅ Added new action for planting techniques

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
