version: "3.1"

nlu:
- intent: greet
  examples: |
    - hey
    - hello
    - hi
    - hello there
    - good morning
    - good evening
    - hey there
    - let's go
    - hey dude
    - goodmorning
    - goodevening
    - good afternoon

- intent: goodbye
  examples: |
    - cu
    - good by
    - see you later
    - good night
    - bye
    - goodbye
    - have a nice day
    - see you around
    - bye bye

- intent: affirm
  examples: |
    - yes
    - y
    - indeed
    - of course
    - that sounds good
    - correct

- intent: deny
  examples: |
    - no
    - n
    - never
    - I don't think so
    - don't like that
    - no way
    - not really

- intent: mood_great
  examples: |
    - perfect
    - great
    - amazing
    - feeling like a king
    - wonderful
    - I am feeling very good
    - I am great
    - I am amazing
    - I am going to save the world
    - super stoked
    - extremely good
    - so so perfect

- intent: mood_unhappy
  examples: |
    - my day was horrible
    - I am sad
    - I don't feel very well
    - I am disappointed
    - super sad
    - I'm so sad
    - sad
    - very sad
    - unhappy
    - not good
    - not very good

- intent: bot_challenge
  examples: |
    - are you a bot?
    - are you a human?
    - am I talking to a bot?
    - am I talking to a human?

- intent: ask_plant_disease
  examples: |
    - Tell me about [powdery mildew](disease_name)
    - What are the symptoms of [rust](disease_name)?
    - How do I treat [leaf spot](disease_name)?
    - What is [blight](disease_name)?
    - Can you help me with [anthracnose](disease_name)?
    - I need information about [black spot](disease_name).
    - What should I do for [canker](disease_name)?
    - What causes [downy mildew](disease_name)?
    - What does [cercospora leaf spot](disease_name) look like?
    - How can I prevent [botrytis (gray mold)](disease_name)?
    - Do you have details on [black spot](disease_name)?
    - What treatment is available for [powdery mildew](disease_name)?
    - How to cure [rust](disease_name)?
    - What are the first signs of [blight](disease_name)?
    - Is [leaf spot](disease_name) dangerous for plants?
    - Can [anthracnose](disease_name) spread to other plants?
    - What are the symptoms of [rust](disease_name)?
    - How can I treat [rust](disease_name)?
    - What causes [rust](disease_name)?
    - Tell me about [powdery mildew](disease_name)
    - What does [powdery mildew](disease_name) look like?
    - How do I cure [powdery mildew](disease_name)?

    

- intent: ask_planting_techniques
  examples: |
    - How do I grow [tomato](plant_name)?
    - What are the best conditions for [lettuce](plant_name)?
    - Tell me how to plant [carrot](plant_name).
    - What is the soil type required for [basil](plant_name)?
    - How much water does [cucumber](plant_name) need?
    - What is the best soil for [zucchini](plant_name)?
    - How often should I water [spinach](plant_name)?
    - What light conditions does [bell pepper](plant_name) need?
    - Can I plant [mint](plant_name) indoors?
    - What are the care instructions for [rosemary](plant_name)?
    - What is the best soil pH for [strawberries](plant_name)?
    - How should I prepare the soil for [blueberries](plant_name)?
    - How much sunlight does [parsley](plant_name) need?
    - What fertilizers are best for [chili](plant_name)?
    - How do I grow [cherry](plant_name)?
    - What is the soil type for [cherry](plant_name)?
    - Tell me how to grow [basil](plant_name)
    - How much water does [cherry](plant_name) need?
    - What is the light requirement for [cherry](plant_name)?
    - What are the care instructions for [cherry](plant_name)?  
