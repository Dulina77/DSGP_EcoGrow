version: "3.1"

rules:
- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: utter_iamabot

- rule: Answer plant disease queries
  steps:
  - intent: ask_plant_disease
  - action: action_get_plant_info

- rule: Answer planting technique queries
  steps:
  - intent: ask_planting_techniques
  - action: action_get_planting_techniques